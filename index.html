<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>STAT+ Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>

  .bebas{font-family:'Bebas Neue',cursive}

  input:focus{border-color:#00f5a0}
  button{cursor:pointer;border:none;transition:all 0.2s}
  .tag{font-family:'Space Mono',monospace;font-size:8px;padding:2px 8px;border-radius:99px}
  .bar-track{height:5px;background:#1e293b;border-radius:99px;overflow:hidden;margin-top:4px}
  .bar-fill{height:100%;border-radius:99px;transition:width 0.8s cubic-bezier(0.16,1,0.3,1)}
  .panel{background:#0a1628;border-radius:12px;padding:18px;flex:1;min-width:0}
  .panels{display:flex;gap:12px;margin-bottom:14px}
  .results-box{background:#0a1628;border:1px solid #1e293b;border-radius:14px;padding:22px;margin-bottom:14px}
  .legend-box{background:#0a1628;border:1px solid #1e293b;border-radius:12px;padding:16px}
  .scoreboard{background:#0a1628;border:1px solid #1e293b;border-radius:12px;padding:20px;margin-bottom:20px;text-align:center}
  .mode-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .mode-btn{flex:1;padding:9px 0;border-radius:8px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase}
  .compare-btn{padding:9px 14px;border-radius:8px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
  .calc-btn{width:100%;padding:13px 0;margin-bottom:26px;background:linear-gradient(135deg,#00f5a0,#00c896);color:#020817;border-radius:10px;font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px}
  .calc-btn:active{opacity:0.8}
  .stat-row{margin-bottom:18px}
  .stat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .compare-row{margin-bottom:20px}
  .compare-bar-row{margin-bottom:6px}
  .compare-name-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
  .legend-dots{display:flex;flex-wrap:wrap;gap:6px 20px}
  .legend-item{display:flex;align-items:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .hint{font-family:'Space Mono',monospace;font-size:8px;color:#334155;margin-top:3px}
  .avg-hint{font-family:'Space Mono',monospace;font-size:8px;color:#334155;margin-bottom:12px;margin-top:-8px}
  .err-hint{font-family:'Space Mono',monospace;font-size:8px;color:#f87171;margin-bottom:12px;margin-top:-8px}
  .section-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}
  .field{margin-bottom:12px}
</style>
</head>
<body>
<div class="container">
  <div style="margin-bottom:28px">

    <div class="mono" style="font-size:9px;color:#334155;margin-top:8px;line-height:1.7">100 = league average · adjusted for pace & scoring era</div>
  </div>

  <div class="mode-row">

<button class="calc-btn" onclick="calculate()">CALCULATE</button>

  {key:'ppgPlus',label:'PPG+'},
  {key:'tsPlus',label:'TS%+'},
  {key:'astPlus',label:'AST%+'},
  {key:'bpmPlus',label:'BPM+'},
  {key:'dbpmPlus',label:'DBPM+'},
  {key:'ortgPlus',label:'Off PPG+'},
  {key:'drtgPlus',label:'Def PPG+'},
];

let mode='player', compareOn=false;

function getColor(v){
  if(v>=160)return'#00f5a0';
  if(v>=130)return'#4ade80';
  if(v>=115)return'#86efac';
  if(v>=100)return'#cbd5e1';
  if(v>=85)return'#fca5a5';
  return'#f87171';
}
function getLabel(v){
  if(v>=160)return'All-Time Elite';
  if(v>=130)return'MVP Caliber';
  if(v>=115)return'All-Star';
  if(v>=100)return'Above Avg';
  if(v>=85)return'Below Avg';
  return'Replacement';
}

function calcStats(inputs){
  const y=parseInt(inputs.year);
  if(!LA[y])return null;
  const avg=LA[y];
  const r={};
  if(mode==='player'||mode==='both'){
    if(inputs.ppg)r.ppgPlus=((parseFloat(inputs.ppg)*(107/avg.pace))/avg.ppg)*100;
    if(inputs.ts)r.tsPlus=(parseFloat(inputs.ts)/avg.ts)*100;
    if(inputs.ast)r.astPlus=(parseFloat(inputs.ast)/avg.ast)*100;
    if(inputs.bpm){const v=parseFloat(inputs.bpm);r.bpmPlus=v<=0?Math.max(40,100+v*8):100+(Math.log(v+1)/Math.log(11))*63;}
    if(inputs.dbpm){const d=parseFloat(inputs.dbpm);r.dbpmPlus=d<=0?Math.max(40,100+d*8):100+(Math.log(d+1)/Math.log(9))*63;}
  }
  if(mode==='team'||mode==='both'){
    if(inputs.ortg)r.ortgPlus=(parseFloat(inputs.ortg)/avg.ortg)*100;
    if(inputs.drtg)r.drtgPlus=(avg.drtg/parseFloat(inputs.drtg))*100;
  }
  return r;
}

function getInputs(p){
  const g=id=>document.getElementById(p+'-'+id);
  return{year:g('year')?g('year').value:'',name:g('name')?g('name').value:'',ppg:g('ppg')?g('ppg').value:'',ts:g('ts')?g('ts').value:'',ast:g('ast')?g('ast').value:'',bpm:g('bpm')?g('bpm').value:'',dbpm:g('dbpm')?g('dbpm').value:'',ortg:g('ortg')?g('ortg').value:'',drtg:g('drtg')?g('drtg').value:''};
}

    <div class="field"><label>TS%</label><input type="number" step="0.001" id="${p}-ts" placeholder="e.g. 0.559"><div class="hint">Decimal (e.g. 0.580)</div></div>

    <div class="field"><label>DBPM</label><input type="number" step="0.1" id="${p}-dbpm" placeholder="e.g. 3.4"><div class="hint">Defensive Box Plus/Minus</div></div>
    `:''}
    ${st?`
    <div class="field"><label>Off. Rating</label><input type="number" step="0.1" id="${p}-ortg" placeholder="e.g. 118.4"><div class="hint">Pts per 100 possessions</div></div>
    <div class="field"><label>Def. Rating</label><input type="number" step="0.1" id="${p}-drtg" placeholder="e.g. 108.1"><div class="hint">Pts allowed per 100</div></div>
    `:''}`;
}

function updateHint(p){
  const yr=parseInt(document.getElementById(p+'-year').value);
  const el=document.getElementById(p+'-avg-hint');
  if(LA[yr]){const a=LA[yr];el.style.color='#334155';el.textContent=`${yr} avg: ${a.ppg}ppg · ${(a.ts*100).toFixed(1)}TS% · pace ${a.pace}`;}
  else if(document.getElementById(p+'-year').value){el.style.color='#f87171';el.textContent='Invalid year (1950–2025)';}
  else el.textContent='';
}

  document.getElementById('panel-a').innerHTML=buildPanel('a','#00f5a0','Player A');
  const pb=document.getElementById('panel-b');

  pb.style.display=compareOn?'block':'none';
}

function setMode(m){
  mode=m;
  ['player','team','both'].forEach(x=>{
    const b=document.getElementById('btn-'+x);
    if(x===m){b.style.background='#00f5a0';b.style.color='#020817';b.style.border='1px solid #00f5a0';b.style.fontWeight='700';}
    else{b.style.background='#0f172a';b.style.color='#64748b';b.style.border='1px solid #1e293b';b.style.fontWeight='400';}
  });
  renderPanels();
  document.getElementById('results').innerHTML='';
}

function toggleCompare(){
  compareOn=!compareOn;

  else{b.style.background='#0f172a';b.style.color='#64748b';b.style.border='1px solid #1e293b';b.style.fontWeight='400';}
  renderPanels();
  document.getElementById('results').innerHTML='';
}

function statRowHTML(label,val){
  if(val===undefined)return'';
  const c=getColor(val),pct=Math.min((val/200)*100,100);
  return`<div class="stat-row"><div class="stat-header"><span class="mono" style="font-size:9px;color:#475569;letter-spacing:2px;text-transform:uppercase">${label}</span><div style="display:flex;align-items:center;gap:8px"><span class="tag" style="color:${c};background:${c}22">${getLabel(val)}</span><span class="bebas" style="font-size:26px;color:${c};letter-spacing:1px">${val.toFixed(1)}</span></div></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c};box-shadow:0 0 6px ${c}88"></div></div></div>`;
}

function compareRowHTML(statLabel,valA,valB,nameA,nameB){
  if(valA===undefined&&valB===undefined)return'';
  const aW=valA!==undefined&&valB!==undefined&&valA>valB;
  const bW=valA!==undefined&&valB!==undefined&&valB>valA;
  const max=Math.max(valA||0,valB||0,160);
  let h=`<div class="compare-row"><div class="mono" style="font-size:9px;color:#475569;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">${statLabel}</div>`;
  if(valA!==undefined){const c='#00f5a0',pct=Math.min((valA/max)*100,100);h+=`<div class="compare-bar-row"><div class="compare-name-row"><span class="mono" style="font-size:9px;color:${aW?c:'#64748b'}">${nameA||'Player A'}${aW?' ▲':''}</span><div style="display:flex;align-items:center;gap:8px"><span class="tag" style="color:${getColor(valA)};background:${getColor(valA)}22">${getLabel(valA)}</span><span class="bebas" style="font-size:22px;color:${aW?c:'#94a3b8'};letter-spacing:1px">${valA.toFixed(1)}</span></div></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c};box-shadow:0 0 6px ${c}88"></div></div></div>`;}
  if(valB!==undefined){const c='#38bdf8',pct=Math.min((valB/max)*100,100);h+=`<div class="compare-bar-row"><div class="compare-name-row"><span class="mono" style="font-size:9px;color:${bW?c:'#64748b'}">${nameB||'Player B'}${bW?' ▲':''}</span><div style="display:flex;align-items:center;gap:8px"><span class="tag" style="color:${getColor(valB)};background:${getColor(valB)}22">${getLabel(valB)}</span><span class="bebas" style="font-size:22px;color:${bW?c:'#94a3b8'};letter-spacing:1px">${valB.toFixed(1)}</span></div></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c};box-shadow:0 0 6px ${c}88"></div></div></div>`;}
  return h+'</div>';
}

function calculate(){
  const inA=getInputs('a'),inB=getInputs('b');
  const resA=calcStats(inA),resB=compareOn?calcStats(inB):null;
  if(!resA){alert('Enter a valid year (1950–2025) for Player A');return;}
  let html='';
  if(compareOn&&resA&&resB){
    let aW=0,bW=0;
    STAT_KEYS.forEach(({key})=>{const a=resA[key],b=resB[key];if(a!==undefined&&b!==undefined){if(a>b)aW++;else if(b>a)bW++;}});
    const winner=aW>bW?(inA.name||'Player A'):bW>aW?(inB.name||'Player B'):null;
    const wc=aW>=bW?'#00f5a0':'#38bdf8';
    html+=`<div class="scoreboard"><div class="mono" style="font-size:9px;color:#475569;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px">Head to Head</div><div style="display:flex;justify-content:center;align-items:center;gap:32px;margin-bottom:14px"><div><div class="bebas" style="font-size:54px;color:#00f5a0;line-height:1">${aW}</div><div class="mono" style="font-size:9px;color:#64748b;margin-top:4px">${inA.name||'Player A'}</div></div><div class="mono" style="font-size:10px;color:#1e293b">VS</div><div><div class="bebas" style="font-size:54px;color:#38bdf8;line-height:1">${bW}</div><div class="mono" style="font-size:9px;color:#64748b;margin-top:4px">${inB.name||'Player B'}</div></div></div>${winner?`<div class="mono" style="font-size:10px;color:${wc};background:${wc}11;border:1px solid ${wc}33;border-radius:99px;padding:6px 18px;display:inline-block">${winner} wins ${Math.max(aW,bW)}–${Math.min(aW,bW)}</div>`:`<div class="mono" style="font-size:10px;color:#64748b">Dead heat</div>`}</div>`;
  }
  html+='<div class="results-box">';
  if(compareOn){STAT_KEYS.forEach(({key,label})=>{html+=compareRowHTML(label,resA[key],resB?resB[key]:undefined,inA.name,inB.name);});}
  else{STAT_KEYS.forEach(({key,label})=>{if(resA[key]!==undefined)html+=statRowHTML(label,resA[key]);});}
  html+='</div>';
  html+=`<div class="legend-box"><div class="mono" style="font-size:8px;color:#334155;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">Scale Reference</div><div class="legend-dots">${[['160+','#00f5a0','All-Time Elite'],['130–159','#4ade80','MVP Caliber'],['115–129','#86efac','All-Star'],['100–114','#cbd5e1','Above Avg'],['85–99','#fca5a5','Below Avg'],['<85','#f87171','Replacement']].map(([r,c,l])=>`<div class="legend-item"><div class="dot" style="background:${c}"></div><span class="mono" style="font-size:8px;color:#475569">${r} · ${l}</span></div>`).join('')}</div></div>`;
  document.getElementById('results').innerHTML=html;
  document.getElementById('results').scrollIntoView({behavior:'smooth'});
}

setMode('player');
</script>

</body>
</html>
